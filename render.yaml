# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Boostify MotionDNA — marketing / early-access landing page.
# This is a self-contained static site (landing/index.html, no build step).
#
# To deploy: log in to Render (convoycubano@gmail.com) ->
# New + -> Blueprint -> connect the GitHub repo qbanito/boostifymodel ->
# Render reads this file and creates the static site automatically.
services:
  - type: web
    name: boostify-motiondna
    runtime: static
    buildCommand: "echo 'Static landing page — no build step required'"
    staticPublishPath: ./landing
    pullRequestPreviewsEnabled: false
    routes:
      # Single-page site: route everything to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
