# Render Blueprint — https://render.com/docs/blueprint-spec
#
# IMPORTANT: BOOSTIFY DATASET STUDIO is a Tauri DESKTOP app. Only the Vite/React
# front-end can be hosted on Render (as a static site). The Rust/Tauri backend
# (file scanning, FFmpeg, SQLite, GPU/Brev control, all `invoke()` commands)
# CANNOT run on Render — it requires the Tauri runtime on a local machine.
# This static deploy therefore renders the UI as a visual demo only; backend
# features will be inert in the browser.
#
# To deploy: log in to Render (convoycubano@gmail.com) ->
# New + -> Blueprint -> connect the GitHub repo qbanito/boostifymodel ->
# Render reads this file and creates the static site automatically.
services:
  - type: web
    name: boostify-dataset-studio
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      # SPA fallback so client-side routing resolves to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
